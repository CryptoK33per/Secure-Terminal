<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Secure Terminal — Caesar Cipher</title>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-deep:      #080b09;
      --bg-term:      #0d1010;
      --bg-bar:       #111614;
      --bg-input:     #090c0a;
      --border:       #1e2e22;
      --border-dim:   #141e16;
      --green-bright: #4ade80;
      --green-mid:    #22c55e;
      --green-dim:    #166534;
      --green-ghost:  #0f2918;
      --yellow:       #facc15;
      --blue:         #7dd3fc;
      --pink:         #f472b6;
      --teal:         #2dd4bf;
      --slate:        #94a3b8;
      --red:          #f87171;
      --text-dim:     #2d4030;
      --font: 'JetBrains Mono', 'Cascadia Code', 'Fira Code', monospace;
    }

    html, body {
      height: 100%;
      background: var(--bg-deep);
      display: flex; align-items: center; justify-content: center;
      font-family: var(--font);
    }

    /* CRT scanlines */
    body::before {
      content: ''; position: fixed; inset: 0;
      background: repeating-linear-gradient(
        to bottom,
        transparent 0px, transparent 2px,
        rgba(0,255,80,0.015) 2px, rgba(0,255,80,0.015) 4px
      );
      pointer-events: none; z-index: 10;
    }
    /* Vignette */
    body::after {
      content: ''; position: fixed; inset: 0;
      background: radial-gradient(ellipse at center, transparent 50%, rgba(0,0,0,0.7) 100%);
      pointer-events: none; z-index: 9;
    }

    #terminal-wrap {
      width: min(740px, 96vw);
      height: min(580px, 92vh);
      display: flex; flex-direction: column;
      border-radius: 10px; overflow: hidden;
      border: 0.5px solid var(--border);
      box-shadow:
        0 0 0 1px #000,
        0 0 40px rgba(74,222,128,0.06),
        0 0 80px rgba(0,0,0,0.8),
        0 30px 60px rgba(0,0,0,0.6);
      position: relative; z-index: 1;
      animation: termFadeIn 0.6s ease both;
    }
    @keyframes termFadeIn {
      from { opacity: 0; transform: translateY(12px) scale(0.99); }
      to   { opacity: 1; transform: translateY(0)   scale(1);    }
    }

    /* Title bar */
    #titlebar {
      background: var(--bg-bar);
      border-bottom: 0.5px solid var(--border);
      padding: 10px 16px;
      display: flex; align-items: center; gap: 7px;
      flex-shrink: 0; user-select: none;
    }
    .dot { width: 12px; height: 12px; border-radius: 50%; cursor: default; }
    .dot-r { background: #ff5f57; box-shadow: 0 0 6px rgba(255,95,87,0.4); }
    .dot-y { background: #febc2e; box-shadow: 0 0 6px rgba(254,188,46,0.4); }
    .dot-g { background: #28c840; box-shadow: 0 0 6px rgba(40,200,64,0.4);  }
    #titlebar-center {
      flex: 1; text-align: center;
      font-size: 11px; letter-spacing: 0.15em;
      color: var(--text-dim); text-transform: uppercase;
    }
    #titlebar-right { font-size: 11px; color: var(--text-dim); letter-spacing: 0.05em; }

    /* Status bar */
    #statusbar {
      background: var(--bg-bar);
      border-bottom: 0.5px solid var(--border-dim);
      padding: 4px 16px;
      display: flex; align-items: center; gap: 16px;
      flex-shrink: 0;
    }
    .status-item {
      font-size: 10px; letter-spacing: 0.06em;
      color: var(--text-dim);
      display: flex; align-items: center; gap: 5px;
    }
    .status-item.active { color: var(--green-mid); }
    .status-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--text-dim); }
    .status-item.active .status-dot {
      background: var(--green-bright);
      box-shadow: 0 0 6px var(--green-bright);
      animation: blink 1.6s ease-in-out infinite;
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

    /* Output */
    #output {
      flex: 1; overflow-y: auto; overflow-x: hidden;
      padding: 14px 18px 6px;
      background: var(--bg-term);
      font-size: 13px; line-height: 1.75;
      scrollbar-width: thin; scrollbar-color: var(--border) transparent;
    }
    #output::-webkit-scrollbar { width: 4px; }
    #output::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .line {
      white-space: pre-wrap; word-break: break-all;
      animation: lineIn 0.08s ease both;
    }
    @keyframes lineIn {
      from { opacity: 0; transform: translateX(-3px); }
      to   { opacity: 1; transform: translateX(0);    }
    }
    .line.system  { color: var(--green-bright); }
    .line.info    { color: var(--blue); }
    .line.prompt  { color: var(--yellow); }
    .line.enc     { color: var(--pink); }
    .line.dec     { color: var(--teal); }
    .line.error   { color: var(--red); }
    .line.dim     { color: var(--text-dim); }
    .line.divider { color: var(--border); }
    .line.success { color: var(--green-mid); }

    /* Message blocks */
    .msg-block {
      margin: 2px 0; padding: 6px 10px;
      border-radius: 0 4px 4px 0;
    }
    .msg-block.mine   { border-left: 2px solid var(--green-dim);  background: rgba(74,222,128,0.03); }
    .msg-block.theirs { border-left: 2px solid #1e3a5f;           background: rgba(125,211,252,0.03); }

    /* Input row */
    #input-row {
      display: flex; align-items: center;
      background: var(--bg-input);
      border-top: 0.5px solid var(--border);
      padding: 10px 16px; gap: 10px; flex-shrink: 0;
    }
    #prompt-label {
      font-size: 13px; color: var(--green-bright);
      flex-shrink: 0; min-width: 84px;
      text-shadow: 0 0 8px rgba(74,222,128,0.5);
      transition: text-shadow 0.3s;
    }
    #input {
      flex: 1; background: transparent; border: none; outline: none;
      color: var(--yellow); font-family: var(--font);
      font-size: 13px; caret-color: var(--green-bright); letter-spacing: 0.02em;
    }
    #input::placeholder { color: var(--text-dim); }
    #input:disabled     { opacity: 0.25; cursor: not-allowed; }
    #input-row:focus-within #prompt-label { text-shadow: 0 0 14px rgba(74,222,128,0.9); }

    #shift-badge {
      font-size: 10px; color: var(--text-dim);
      background: var(--bg-bar); border: 0.5px solid var(--border-dim);
      border-radius: 3px; padding: 2px 8px; letter-spacing: 0.06em;
      flex-shrink: 0; transition: all 0.3s;
    }
    #shift-badge.armed {
      color: var(--green-mid); border-color: var(--green-dim);
      background: var(--green-ghost);
    }

    /* ── Join notification ── */
    .join-notify {
      display: flex; align-items: center; gap: 10px;
      margin: 6px 0; padding: 7px 12px;
      border: 0.5px solid #1e3a5f;
      border-left: 3px solid var(--blue);
      background: rgba(125,211,252,0.05);
      border-radius: 0 4px 4px 0;
      animation: lineIn 0.15s ease both;
    }
    .join-notify .jn-dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--blue); flex-shrink: 0;
      box-shadow: 0 0 8px var(--blue);
      animation: blink 1.6s ease-in-out 3;
    }
    .join-notify .jn-text { font-size: 12px; color: var(--blue); letter-spacing: 0.05em; }
    .join-notify .jn-time { font-size: 10px; color: var(--text-dim); margin-left: auto; }

    /* ── Access Denied overlay ── */
    #access-denied {
      display: none;
      position: absolute; inset: 0;
      background: rgba(8,5,5,0.97);
      z-index: 100;
      flex-direction: column;
      align-items: center; justify-content: center;
      gap: 18px;
      animation: adFadeIn 0.4s ease both;
    }
    #access-denied.show { display: flex; }
    @keyframes adFadeIn {
      from { opacity: 0; } to { opacity: 1; }
    }
    .ad-border {
      border: 1.5px solid #7f1d1d;
      border-radius: 8px;
      padding: 36px 48px;
      display: flex; flex-direction: column; align-items: center; gap: 16px;
      background: rgba(127,29,29,0.08);
      box-shadow: 0 0 60px rgba(248,113,113,0.08), inset 0 0 40px rgba(127,29,29,0.06);
      position: relative; overflow: hidden;
    }
    /* Red scan sweep */
    .ad-border::before {
      content: '';
      position: absolute; top: -100%; left: 0; right: 0; height: 40%;
      background: linear-gradient(to bottom, transparent, rgba(248,113,113,0.04), transparent);
      animation: scanSweep 2s linear infinite;
    }
    @keyframes scanSweep {
      from { top: -40%; } to { top: 120%; }
    }
    .ad-skull {
      font-size: 42px; line-height: 1;
      color: #f87171;
      text-shadow: 0 0 20px rgba(248,113,113,0.6), 0 0 40px rgba(248,113,113,0.3);
      animation: adPulse 1.2s ease-in-out infinite;
    }
    @keyframes adPulse {
      0%,100% { text-shadow: 0 0 20px rgba(248,113,113,0.6), 0 0 40px rgba(248,113,113,0.3); }
      50%      { text-shadow: 0 0 30px rgba(248,113,113,1),   0 0 60px rgba(248,113,113,0.5); }
    }
    .ad-title {
      font-size: 28px; font-weight: 600;
      letter-spacing: 0.25em; color: #f87171;
      text-shadow: 0 0 20px rgba(248,113,113,0.8);
      animation: adGlitch 4s ease-in-out infinite;
    }
    @keyframes adGlitch {
      0%,95%,100% { transform: translate(0); clip-path: none; }
      96%  { transform: translate(-3px, 1px); clip-path: inset(20% 0 30% 0); }
      97%  { transform: translate(3px, -1px); clip-path: inset(60% 0 10% 0); }
      98%  { transform: translate(0); clip-path: none; }
    }
    .ad-sub {
      font-size: 11px; letter-spacing: 0.18em;
      color: #7f1d1d; text-transform: uppercase;
    }
    .ad-line { width: 100%; height: 0.5px; background: #7f1d1d; opacity: 0.5; }
    .ad-detail {
      font-size: 11px; color: #991b1b; letter-spacing: 0.08em; text-align: center;
      line-height: 1.8;
    }
    .ad-lockcode {
      font-size: 10px; color: #450a0a; letter-spacing: 0.12em;
      margin-top: 4px;
    }
  </style>
</head>
<body>

<div id="terminal-wrap" style="position:relative;">

  <!-- ── ACCESS DENIED OVERLAY ── -->
  <div id="access-denied">
    <div class="ad-border">
      <div class="ad-skull">⛔</div>
      <div class="ad-title">ACCESS DENIED</div>
      <div class="ad-sub">Security breach detected</div>
      <div class="ad-line"></div>
      <div class="ad-detail">
        INCORRECT SECRET KEY — MAX ATTEMPTS REACHED<br>
        THIS SESSION HAS BEEN TERMINATED
      </div>
      <div class="ad-lockcode" id="ad-lockcode">LOCK-ID: ··············</div>
    </div>
  </div>

  <div id="titlebar">
    <div class="dot dot-r"></div>
    <div class="dot dot-y"></div>
    <div class="dot dot-g"></div>
    <div id="titlebar-center">SECURE TERMINAL — CAESAR CIPHER LIVE CHAT</div>
    <div id="titlebar-right">--:--:--</div>
  </div>

  <div id="statusbar">
    <div class="status-item" id="st-conn">
      <div class="status-dot"></div><span>OFFLINE</span>
    </div>
    <div class="status-item" id="st-cipher">
      <div class="status-dot"></div><span>CIPHER: STANDBY</span>
    </div>
    <div class="status-item" id="st-shift">
      <div class="status-dot"></div><span>SHIFT: --</span>
    </div>
  </div>

  <div id="output" aria-live="polite" role="log"></div>

  <div id="input-row">
    <span id="prompt-label">guest ▶</span>
    <input id="input" type="text" autocomplete="off" spellcheck="false"
           placeholder="type here and press Enter..." aria-label="terminal input" />
    <span id="shift-badge">SHIFT: --</span>
  </div>
</div>

<!-- ═══════════════════════════════════════════════════════════════════
     FIREBASE SDK  (ESM via CDN — no npm needed)
     ═══════════════════════════════════════════════════════════════════ -->
<script type="module">
  import { initializeApp }
    from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import {
    getDatabase, ref, push, onChildAdded,
    serverTimestamp, onDisconnect, set, get
  } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

  /* ═══════════════════════════════════════════════════════════════════
     ▼▼▼  PASTE YOUR FIREBASE CONFIG HERE  ▼▼▼
     1. console.firebase.google.com → create project
     2. Project Settings → Your apps → Add web app → copy firebaseConfig
     3. Realtime Database → Create database → Start in TEST MODE
     ═══════════════════════════════════════════════════════════════════ */
  const firebaseConfig = {
  apiKey: "AIzaSyDH81TddbIyqZi6PEgTX6jzC8TSAEAV4s4",
  authDomain: "line-75c21.firebaseapp.com",
  databaseURL: "https://line-75c21-default-rtdb.firebaseio.com",
  projectId: "line-75c21",
  storageBucket: "line-75c21.firebasestorage.app",
  messagingSenderId: "777376605176",
  appId: "1:777376605176:web:7d94a27016094ff4a66c0d"
};
  /* ▲▲▲  END OF CONFIG  ▲▲▲ */

  const app = initializeApp(firebaseConfig);
  const db  = getDatabase(app);

  // ── DOM ──────────────────────────────────────────────────────────────
  const output    = document.getElementById("output");
  const input     = document.getElementById("input");
  const promptL   = document.getElementById("prompt-label");
  const shiftBdg  = document.getElementById("shift-badge");
  const stConn    = document.getElementById("st-conn");
  const stCipher  = document.getElementById("st-cipher");
  const stShift   = document.getElementById("st-shift");
  const clockEl   = document.getElementById("titlebar-right");
  const adOverlay = document.getElementById("access-denied");
  const adLockId  = document.getElementById("ad-lockcode");

  // ── State ─────────────────────────────────────────────────────────────
  let step        = 0;   // 0=username 1=id 2=roomId 3=secretKey 4=chat
  let user        = { username: "guest", id: "" };
  let roomId      = "";
  let secretKey   = "";
  let inChat      = false;
  let msgRef      = null;
  let seenKeys    = new Set();
  let keyAttempts = 0;
  const MAX_TRIES = 2;

  // Simple deterministic hash to validate key without storing raw key
  function hashKey(k) {
    let h = 0;
    for (let i = 0; i < k.length; i++) h = (Math.imul(31, h) + k.charCodeAt(i)) | 0;
    return (h >>> 0).toString(16).padStart(8, "0");
  }

  input.disabled = true;

  // ── Clock ─────────────────────────────────────────────────────────────
  (function tickClock() {
    clockEl.textContent = new Date().toLocaleTimeString("en-GB", { hour12: false });
    setTimeout(tickClock, 1000);
  })();

  // ── Session storage ───────────────────────────────────────────────────
  const saveUser  = u  => { try { sessionStorage.setItem("termUser", JSON.stringify(u)); } catch(e){} };
  const loadUser  = () => { try { const r = sessionStorage.getItem("termUser"); return r ? JSON.parse(r) : null; } catch(e){ return null; } };
  const clearUser = () => { try { sessionStorage.removeItem("termUser"); } catch(e){} };

  // ── Print helpers ─────────────────────────────────────────────────────
  function print(text = "", cls = "") {
    const d = document.createElement("div");
    d.className = "line" + (cls ? " " + cls : "");
    d.textContent = text;
    output.appendChild(d);
    output.scrollTop = output.scrollHeight;
  }

  function typeLine(text, cls = "system", speed = 12) {
    return new Promise(resolve => {
      const d = document.createElement("div");
      d.className = "line " + cls;
      output.appendChild(d);
      let i = 0;
      (function tick() {
        if (i < text.length) {
          d.textContent += text[i++];
          output.scrollTop = output.scrollHeight;
          setTimeout(tick, speed);
        } else resolve();
      })();
    });
  }

  const delay = ms => new Promise(r => setTimeout(r, ms));

  // ── Caesar cipher ─────────────────────────────────────────────────────
  function caesarShift(text, n) {
    n = ((n % 26) + 26) % 26;
    if (n === 0) return text;
    return [...text].map(ch => {
      const c = ch.charCodeAt(0);
      if (c >= 65 && c <= 90) return String.fromCharCode((c - 65 + n) % 26 + 65);
      if (c >= 97 && c <= 122) return String.fromCharCode((c - 97 + n) % 26 + 97);
      return ch;
    }).join("");
  }
  const encrypt = (t, s) => caesarShift(t, s);
  const decrypt = (t, s) => caesarShift(t, 26 - ((s % 26 + 26) % 26));

  function getShift() {
    if (!secretKey) return 3;
    let s = 0;
    for (const ch of secretKey) s += ch.charCodeAt(0);
    return (s % 25) + 1;
  }

  // ── Status bar ────────────────────────────────────────────────────────
  function setStatus(el, label, active = false) {
    el.querySelector("span").textContent = label;
    el.classList.toggle("active", active);
  }
  function armStatus() {
    const sh = getShift();
    setStatus(stConn,   "ROOM: " + roomId, true);
    setStatus(stCipher, "CIPHER: ACTIVE",  true);
    setStatus(stShift,  "SHIFT: " + sh,    true);
    shiftBdg.textContent = "SHIFT: " + sh;
    shiftBdg.classList.add("armed");
  }

  // ── Access denied overlay ─────────────────────────────────────────────
  function showAccessDenied() {
    input.disabled = true;
    const lockId = "LOCK-" + Date.now().toString(16).toUpperCase();
    adLockId.textContent = "LOCK-ID: " + lockId;
    adOverlay.classList.add("show");
  }

  // ── Boot ──────────────────────────────────────────────────────────────
  async function boot() {
    await delay(80);
    await typeLine("[ Initializing Secure Terminal v2.0... ]", "system", 10);
    await delay(100);
    await typeLine("[ Loading Caesar Cipher Modules...     ]", "system", 10);
    await delay(100);
    await typeLine("[ Connecting to Firebase Network...    ]", "system", 10);
    await delay(180);
    await typeLine("[ All Systems Ready \u2713                  ]", "success", 10);
    print();
    print("\u2500".repeat(50), "divider");
    print("  CAESAR CIPHER  \u00b7  LIVE MULTI-DEVICE CHAT", "dim");
    print("  Same room ID + key = same encrypted channel", "dim");
    print("  Type /help for commands", "dim");
    print("\u2500".repeat(50), "divider");
    print();

    const saved = loadUser();
    if (saved) {
      user = saved;
      step = 2;
      print("  Welcome back, " + user.username + "  [id: " + user.id + "]", "info");
      print();
      print("  Enter Room ID:", "system");
    } else {
      print("  Enter Username:", "system");
    }
    input.disabled = false;
    input.focus();
  }

  // ── Validate key against Firebase ────────────────────────────────────
  async function validateAndJoin() {
    const metaRef  = ref(db, "rooms/" + roomId + "/meta/keyHash");
    const snap     = await get(metaRef);
    const myHash   = hashKey(secretKey);

    if (!snap.exists()) {
      // First person in room — register the key hash
      await set(metaRef, myHash);
      await joinRoom();
      return;
    }

    const storedHash = snap.val();
    if (storedHash === myHash) {
      keyAttempts = 0;
      await joinRoom();
    } else {
      keyAttempts++;
      const remaining = MAX_TRIES - keyAttempts;
      if (remaining <= 0) {
        // Flash red warning then lock
        print("", "");
        print("  \u2588\u2588 WRONG KEY \u2014 NO ATTEMPTS REMAINING", "error");
        print("  \u2588\u2588 TERMINATING SESSION...", "error");
        await delay(900);
        showAccessDenied();
      } else {
        print("  [ \u26a0 Wrong key! " + remaining + " attempt" + (remaining === 1 ? "" : "s") + " remaining ]", "error");
        print("  Enter Secret Key:", "system");
        input.disabled = false;
        input.focus();
        // Stay on step 3 so they can retry
      }
    }
  }

  // ── Join room ─────────────────────────────────────────────────────────
  async function joinRoom() {
    inChat = true;
    const sh = getShift();
    promptL.textContent = user.username.slice(0, 10) + " \u25b6";
    armStatus();

    print();
    print("\u2500".repeat(50), "divider");
    print("  User   : " + user.username + "  [" + user.id + "]", "info");
    print("  Room   : " + roomId, "info");
    print("  Key    : \"" + secretKey + "\"  \u2192  shift " + sh, "info");
    print("\u2500".repeat(50), "divider");
    print("  [ Joining room... ]", "system");

    msgRef = ref(db, "rooms/" + roomId + "/messages");

    const presRef = ref(db, "rooms/" + roomId + "/presence/" + user.id);
    await set(presRef, { username: user.username, joinedAt: serverTimestamp() });
    onDisconnect(presRef).remove();

    // Push join announcement
    await push(msgRef, {
      type:      "join",
      username:  user.username,
      sender:    user.id,
      timestamp: serverTimestamp()
    });

    // Listen for new messages
    onChildAdded(msgRef, snap => {
      if (!snap.key || seenKeys.has(snap.key)) return;
      seenKeys.add(snap.key);
      renderMsg(snap.val());
    });

    print("  [ Connection Established \u2713 ]", "success");
    print("  [ Caesar Encryption Active \u2713 ]", "success");
    print("\u2500".repeat(50), "divider");
    print("  Commands: /help  /rename <n>  /deleteuser  /reset", "dim");
    print("\u2500".repeat(50), "divider");
    print();
  }

  // ── Render incoming message ───────────────────────────────────────────
  function renderMsg(data) {
    if (!data) return;
    const sh = getShift();

    // Join notification — styled banner
    if (data.type === "join") {
      // Don't show our own join to ourselves
      if (data.sender === user.id) return;
      const timeStr = new Date().toLocaleTimeString("en-GB", { hour12: false });
      const banner = document.createElement("div");
      banner.className = "join-notify";
      banner.innerHTML =
        "<div class=\"jn-dot\"></div>" +
        "<div class=\"jn-text\">\u25b6 " + (data.username || "Unknown") + " joined the room</div>" +
        "<div class=\"jn-time\">" + timeStr + "</div>";
      output.appendChild(banner);
      output.scrollTop = output.scrollHeight;
      return;
    }

    // Legacy system messages
    if (data.type === "system") {
      print("  \u25c8 " + data.text, "dim");
      return;
    }

    if (data.type !== "chat") return;

    const isMine = data.sender === user.id;
    const name   = (data.username || "???").slice(0, 10);

    print();
    const block = document.createElement("div");
    block.className = "msg-block " + (isMine ? "mine" : "theirs");

    let rows;
    if (isMine) {
      // MY message: show raw + encrypted only (NO decrypted)
      rows = [
        { label: "  YOU         ", text: data.raw,       cls: "prompt" },
        { label: "  ENC         ", text: data.encrypted, cls: "enc"    },
      ];
    } else {
      // THEIR message: show encrypted only (NO decrypted)
      rows = [
        { label: ("  " + name).padEnd(14), text: data.encrypted, cls: "info" },
      ];
    }

    rows.forEach(({ label, text, cls }) => {
      const d = document.createElement("div");
      d.className = "line " + cls;
      d.textContent = label + ": " + text;
      block.appendChild(d);
    });

    output.appendChild(block);
    print();
    output.scrollTop = output.scrollHeight;
  }

  // ── Send message ──────────────────────────────────────────────────────
  async function sendMsg(raw) {
    if (!msgRef) return;
    const sh  = getShift();
    const enc = encrypt(raw, sh);
    await push(msgRef, {
      type:      "chat",
      raw,
      encrypted: enc,
      sender:    user.id,
      username:  user.username,
      timestamp: serverTimestamp()
    });
  }

  // ── Commands ──────────────────────────────────────────────────────────
  function handleCommand(value) {
    const lv = value.toLowerCase().trim();
    if (lv === "/help") {
      print();
      print("  \u250c\u2500 COMMANDS \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2510", "dim");
      print("  \u2502  /rename <name>   change your display name  \u2502", "dim");
      print("  \u2502  /deleteuser      delete saved profile      \u2502", "dim");
      print("  \u2502  /reset           full terminal reset       \u2502", "dim");
      print("  \u2502  /clear           clear the screen          \u2502", "dim");
      print("  \u2502  /whoami          show current user info    \u2502", "dim");
      print("  \u2514\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2518", "dim");
      print();
      return true;
    }
    if (lv === "/clear")  { output.innerHTML = ""; return true; }
    if (lv === "/whoami") {
      print();
      print("  Username : " + user.username, "info");
      print("  ID       : " + (user.id  || "\u2014"), "info");
      print("  Room     : " + (roomId   || "\u2014"), "info");
      print("  Shift    : " + (inChat ? getShift() : "\u2014"), "info");
      print();
      return true;
    }
    if (lv === "/reset") {
      clearUser();
      print("  [ Resetting... ]", "info");
      setTimeout(() => location.reload(), 700);
      return true;
    }
    if (lv === "/deleteuser") {
      clearUser();
      print("  [ User deleted. Reloading... ]", "info");
      setTimeout(() => location.reload(), 700);
      return true;
    }
    if (value.startsWith("/rename ")) {
      const name = value.slice(8).trim();
      if (!name) { print("  [ Error: provide a name ]", "error"); return true; }
      user.username = name;
      saveUser(user);
      promptL.textContent = name.slice(0, 10) + " \u25b6";
      print("  [ Renamed to \"" + name + "\" ]", "success");
      return true;
    }
    if (value.startsWith("/")) {
      print("  [ Unknown command: " + value + " \u2014 type /help ]", "error");
      return true;
    }
    return false;
  }

  // ── Input handler ─────────────────────────────────────────────────────
  function handleInput(value) {
    if (handleCommand(value)) return;
    switch (step) {
      case 0:
        if (!value.trim()) { print("  [ Error: username cannot be empty ]", "error"); return; }
        user.username = value.trim();
        step = 1;
        print("  Enter Unique ID:", "system");
        break;
      case 1:
        if (!value.trim()) { print("  [ Error: ID cannot be empty ]", "error"); return; }
        user.id = value.trim();
        saveUser(user);
        step = 2;
        print("  Enter Room ID:", "system");
        break;
      case 2:
        if (!value.trim()) { print("  [ Error: Room ID cannot be empty ]", "error"); return; }
        roomId = value.trim();
        step = 3;
        print("  Enter Secret Key:", "system");
        break;
      case 3:
        secretKey = value;
        input.disabled = true;
        validateAndJoin();
        break;
      default:
        if (!value.trim()) return;
        sendMsg(value);
        break;
    }
  }

  // ── Keyboard ──────────────────────────────────────────────────────────
  input.addEventListener("keydown", e => {
    if (e.key !== "Enter") return;
    const raw = input.value;
    input.value = "";
    if (!raw.trim()) return;
    if (!inChat) {
      print("  > " + (step === 3 ? "\u2022".repeat(raw.trim().length) : raw.trim()), "dim");
    }
    handleInput(raw);
  });

  boot();
</script>
</body>
</html>
